<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESET Story Ad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', sans-serif;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  /* 1080x1920 — Instagram Story */
  .ad {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    background: #1a1a1a;
  }

  /* תמונת רקע מלאה */
  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* שכבת כהות מתונה מלמטה */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.10) 0%,
      rgba(0,0,0,0.15) 40%,
      rgba(0,0,0,0.82) 68%,
      rgba(0,0,0,0.95) 100%
    );
  }

  /* תג RESET למעלה */
  .brand-tag {
    position: absolute;
    top: 72px;
    right: 72px;
    background: #E8825A;
    color: #fff;
    font-size: 28px;
    font-weight: 800;
    padding: 14px 36px;
    border-radius: 60px;
    letter-spacing: 3px;
  }

  /* תוכן תחתון — על הכהות */
  .content {
    position: absolute;
    bottom: 0;
    right: 0;
    left: 0;
    padding: 72px 72px 80px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  /* וו */
  .hook-sub {
    font-size: 38px;
    font-weight: 700;
    color: #E8825A;
    margin-bottom: 8px;
  }

  .hook-main {
    font-size: 88px;
    font-weight: 900;
    color: #fff;
    line-height: 1.0;
    letter-spacing: -2px;
  }

  .hook-main span {
    color: #E8825A;
  }

  /* קו הפרדה */
  .divider {
    width: 80px;
    height: 5px;
    background: #E8825A;
    border-radius: 4px;
  }

  /* בעיה + הבטחה */
  .body-text {
    font-size: 32px;
    color: rgba(255,255,255,0.88);
    line-height: 1.6;
    font-weight: 400;
  }

  .body-text strong {
    color: #fff;
    font-weight: 800;
    display: block;
    font-size: 35px;
    margin-top: 6px;
  }

  /* פילז */
  .pills {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 18px;
    font-size: 29px;
    font-weight: 700;
    color: #fff;
  }

  .pill-dot {
    width: 10px;
    height: 10px;
    background: #E8825A;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* דחיפות */
  .urgency {
    background: rgba(232, 130, 90, 0.18);
    border: 2px solid #E8825A;
    border-radius: 16px;
    padding: 24px 36px;
    font-size: 30px;
    font-weight: 800;
    color: #E8825A;
    text-align: center;
  }

  /* CTA */
  .cta-btn {
    background: #E8825A;
    color: #fff;
    border-radius: 20px;
    padding: 40px 48px;
    text-align: center;
  }

  .cta-btn .cta-main {
    font-size: 46px;
    font-weight: 900;
    letter-spacing: -1px;
    display: block;
    margin-bottom: 8px;
  }

  .cta-btn .cta-sub {
    font-size: 26px;
    font-weight: 400;
    opacity: 0.88;
    display: block;
  }
</style>
</head>
<body>
<div class="ad">

  <!-- תמונת רקע -->
  <img class="bg-photo" src="elisheva-photo.png" alt="אלישבע מייער" />
  <div class="overlay"></div>

  <!-- תג מותג -->
  <div class="brand-tag">RESET</div>

  <!-- תוכן -->
  <div class="content">

    <div>
      <div class="hook-sub">מפרסמת באינסטגרם...</div>
      <div class="hook-main">ועדיין<br><span>אין פניות?</span></div>
    </div>

    <div class="divider"></div>

    <div class="body-text">
      הבעיה היא לא התוכן שאת מעלה.
      <strong>הבעיה היא שאין לך מסר ברור שמדבר לקהל הנכון.</strong>
    </div>

    <div class="pills">
      <div class="pill"><div class="pill-dot"></div>מסר שמדבר לקהל שלך</div>
      <div class="pill"><div class="pill-dot"></div>אסטרטגיית תוכן ממוקדת</div>
      <div class="pill"><div class="pill-dot"></div>תכנית לשבועיים + סיכום כתוב</div>
    </div>

    <div class="urgency">⚡ מספר מקומות מוגבל בחודש</div>

    <div class="cta-btn">
      <span class="cta-main">שלחי לי הודעה בפרטי</span>
      <span class="cta-sub">פגישת RESET · 1:1 · שעה אחת</span>
    </div>

  </div>
</div>
</body>
</html>
