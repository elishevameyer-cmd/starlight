  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', sans-serif;
    background: #FAF8F5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .ad {
    width: 1080px;
    height: 1920px;
    background: #FAF8F5;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 80px 80px 0;
  }

  /* שורה עליונה */
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 64px;
  }

  .brand {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 6px;
    color: #111;
  }

  .brand span {
    color: #E8825A;
  }

  .tag {
    font-size: 24px;
    font-weight: 700;
    color: #888;
    letter-spacing: 1px;
  }

  /* כותרת ענקית */
  .headline {
    margin-bottom: 56px;
  }

  .headline .line1 {
    font-size: 120px;
    font-weight: 900;
    color: #111;
    line-height: 0.95;
    letter-spacing: -4px;
    display: block;
  }

  .headline .line2 {
    font-size: 120px;
    font-weight: 900;
    color: #E8825A;
    line-height: 0.95;
    letter-spacing: -4px;
    display: block;
  }

  .headline .line3 {
    font-size: 120px;
    font-weight: 900;
    color: #111;
    line-height: 0.95;
    letter-spacing: -4px;
    display: block;
  }

  /* קו דקורטיבי */
  .line-deco {
    width: 100%;
    height: 2px;
    background: #E8E0D8;
    margin-bottom: 48px;
  }

  /* תמונה עגולה */
  .photo-circle {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    overflow: hidden;
    border: 6px solid #E8825A;
    flex-shrink: 0;
    align-self: center;
    margin-bottom: 52px;
  }

  .photo-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 10%;
  }

  /* טקסט קצר */
  .body-text {
    font-size: 36px;
    color: #444;
    line-height: 1.6;
    text-align: center;
    margin-bottom: 52px;
    padding: 0 20px;
  }

  .body-text strong {
    color: #111;
    font-weight: 800;
  }

  /* נקודות */
  .checks {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 52px;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 30px;
    font-weight: 700;
    color: #111;
  }

  .check-icon {
    color: #E8825A;
    font-size: 34px;
    flex-shrink: 0;
  }

  /* דחיפות */
  .urgency {
    font-size: 26px;
    color: #888;
    text-align: center;
    font-weight: 600;
    margin-bottom: 48px;
    letter-spacing: 1px;
  }

  .urgency span {
    color: #E8825A;
    font-weight: 800;
  }

  /* CTA */
  .cta {
    background: #111;
    color: #fff;
    border-radius: 24px;
    padding: 44px 56px;
    text-align: center;
    margin: 0 0 80px;
  }

  .cta-main {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: -1px;
    display: block;
    margin-bottom: 10px;
  }

  .cta-sub {
    font-size: 26px;
    font-weight: 400;
    color: #E8825A;
    display: block;
  }
</style>
</head>
