<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תודה | אלישבע מייער</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Heebo',sans-serif; direction:rtl; background:#f7f7f7; color:#1A1A1A; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card {
    max-width:400px; width:90%;
    background:#fff; border-radius:24px;
    padding:48px 32px; text-align:center;
    box-shadow:0 4px 24px rgba(0,0,0,0.07);
  }
  .icon { font-size:52px; margin-bottom:20px; }
  h1 { font-size:26px; font-weight:900; margin-bottom:10px; }
  h1 span { color:#F07A57; }
  p { font-size:15px; color:#888; line-height:1.7; margin-bottom:28px; }
  a {
    display:inline-block;
    background:#F07A57; color:#fff;
    font-family:'Heebo',sans-serif; font-size:15px; font-weight:700;
    padding:14px 36px; border-radius:50px; text-decoration:none;
    transition:opacity 0.2s;
  }
  a:hover { opacity:0.9; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🧡</div>
  <h1>קיבלתי,<br><span>תודה!</span></h1>
  <p>אחזור אליך תוך יום-יומיים.<br>מצפה להכיר אותך ואת העסק שלך.</p>
  <a href="index.html">← חזרה לדף הבית</a>
</div>
</body>
</html>
